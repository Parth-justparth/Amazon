<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SecondLife AI — Green Points Wallet</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="wrap wrap-narrow">
    <div class="crumbs"><a href="/static/index.html">Home</a><span>›</span>Your Account<span>›</span>Green Points</div>

    <div class="card">
      <div class="card-head row-between">
        <div><h2>Green Points Wallet</h2><p class="muted">Earn points on every sustainable resolution. 1 point = ₹1.00.</p></div>
        <div class="field" style="margin:0; min-width:200px;">
          <label for="customerId">Viewing account</label>
          <select id="customerId" onchange="loadBalance()">
            <option value="cust_01">Aarav (cust_01)</option>
            <option value="cust_02">Diya (cust_02)</option>
            <option value="buyer_22">Rahul (buyer_22)</option>
          </select>
        </div>
      </div>

      <div class="wallet">
        <h3>Available balance</h3>
        <div class="bal" id="balance">0</div>
        <div class="unit">Green Points</div>
      </div>

      <div class="card" style="box-shadow:none; margin-top:18px;">
        <h3 class="mb-1">Redeem to Amazon Pay</h3>
        <p class="muted mb-2">Convert your Green Points into Amazon Pay balance instantly.</p>
        <div class="row wrap-row">
          <div class="field" style="margin:0; flex:1; min-width:200px;">
            <label for="redeemAmount">Points to redeem</label>
            <input type="number" id="redeemAmount" min="1" placeholder="e.g. 500" />
            <div class="hint" id="redeemPreview"></div>
          </div>
          <button class="btn btn-cta" id="redeemBtn" style="align-self:flex-start; margin-top:24px;" onclick="redeem()">Redeem now</button>
        </div>
      </div>

      <div id="ledgerNote" class="alert alert-info mt-2 hidden"></div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/wallet.js"></script>
</body>
</html>
